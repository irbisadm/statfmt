name: CI

on:
  push:
    branches-ignore: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: typecheck · build · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # ReadStat (built from source for the end-to-end tests) needs a C
      # toolchain and zlib; iconv ships with glibc.
      - name: Install reference build dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential zlib1g-dev
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: npm test

  commitlint:
    name: lint commit messages
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Validate PR commit messages
        run: >
          npx commitlint
          --from "${{ github.event.pull_request.base.sha }}"
          --to "${{ github.event.pull_request.head.sha }}"

  preview-release:
    name: preview next version
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # Check out the PR head branch with full history + tags so the last
      # version tag and the commits since it are available.
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # Self-contained bump computation (git + Node only) — avoids fighting
      # semantic-release's PR/branch detection just to preview a version.
      - name: Preview next version from Conventional Commits
        run: node .github/scripts/next-version.mjs

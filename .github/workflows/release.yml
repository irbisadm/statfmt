name: Release

on:
  push:
    branches: [main]

# semantic-release pushes the changelog/version commit + tag and opens the
# GitHub release (contents/issues/PRs); id-token lets npm authenticate to the
# registry via OIDC Trusted Publishing (no long-lived NPM_TOKEN) and mint
# provenance attestations.
permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: semantic-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      # Node 22 satisfies semantic-release v25; the registry URL is left to
      # @semantic-release/npm so setup-node does not inject a token placeholder
      # that would shadow OIDC.
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # Trusted Publishing needs npm >= 11.5.1; Node 22 ships npm 10.x.
      - name: Upgrade npm for Trusted Publishing (OIDC)
        run: npm install -g npm@latest
      - name: Install reference build dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential zlib1g-dev
      - run: npm ci
      - run: npm run build
      # Never publish a broken build: the full suite (incl. the ReadStat
      # end-to-end cross-validation) must pass before a release is cut.
      - run: npm test
      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional fallback: only used if a NPM_TOKEN secret is present (e.g.
          # to bootstrap the very first publish before Trusted Publishing can be
          # configured). Otherwise publishing goes through OIDC.
          HAS_NPM_TOKEN: ${{ secrets.NPM_TOKEN != '' }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
        run: |
          if [ "$HAS_NPM_TOKEN" != "true" ]; then unset NPM_TOKEN; fi
          npx semantic-release
